<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Section</title>
    <!-- Link to Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .section-heading {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .text-center {
            text-align: center;
        }
        .wow {
            visibility: visible;
            animation-name: bounceIn;
        }
        .bounceIn {
            animation-duration: 2s;
            animation-fill-mode: both;
        }
        .fa-3x {
            font-size: 3em;
        }
        .primary {
            border: none;
            height: 2px;
            background: #007bff;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <section id="contact">
        <div class="container">
            <div class="row">
                <div class="col-lg-8 col-lg-offset-2 text-center">
                    <h2 class="section-heading">Let's Get In Touch!</h2>
                    <hr class="primary">
                    <p>Ready to start your next project with me? That's great! Give me a call or send me an email and I will get back to you as soon as possible!</p>
                </div>
                <div class="col-lg-2 col-lg-offset-1 text-center">
                    <a href="https://linkedin.com/in/{{ site.linkedin_username }}">
                        <i class="fa fa-linkedin fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                        <p>{{ site.linkedin_username }}</p>
                    </a>
                </div>
                <div class="col-lg-2 col-lg-offset-1 text-center">
                    <a href="mailto:{{ site.email }}">
                        <i class="fa fa-envelope fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                        <p>{{ site.email }}</p>
                    </a>
                </div>
                <div class="col-lg-2 col-lg-offset-1 text-center">
                    <a href="https://github.com/{{ site.github_username }}">
                        <i class="fa fa-github fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                        <p>{{ site.github_username }}</p>
                    </a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
