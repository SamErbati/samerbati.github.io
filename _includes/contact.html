<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Section</title>
    <!-- Link to Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        #contact {
            text-align: center;
        }
        .section-heading {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .wow {
            visibility: visible;
            animation-name: bounceIn;
        }
        .bounceIn {
            animation-duration: 2s;
            animation-fill-mode: both;
        }
        .fa-3x {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .primary {
            border: none;
            height: 2px;
            background: #007bff;
            margin: 20px auto;
            width: 50%;
        }
        .contact-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .contact-icons a {
            text-decoration: none;
            color: inherit;
        }
        .contact-icons i {
            color: #007bff;
        }
    </style>
</head>
<body>
    <section id="contact">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">Let's Get In Touch!</h2>
                    <hr class="primary">
                    <p>Ready to start your next project with me? That's great! Give me a call or send me an email and I will get back to you as soon as possible!</p>
                    <div class="contact-icons">
                        <a href="https://linkedin.com/in/your-linkedin-username" target="_blank">
                            <i class="fas fa-user-tie fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                            <p>www.linkedin.com/in/sam-erbati</p>
                        </a>
                        <a href="mailto:your-email@example.com">
                            <i class="fas fa-envelope-open-text fa-3x wow bounceIn" data-wow-delay=".2s"></i>
                            <p>sam.erbati22@gmail.com</p>
                        </a>
                        <a href="https://github.com/your-github-username" target="_blank">
                            <i class="fas fa-code-branch fa-3x wow bounceIn" data-wow-delay=".3s"></i>
                            <p>https://github.com/SamErbati</p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
