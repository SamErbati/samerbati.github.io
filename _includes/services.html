<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interests</title>
    <!-- Link to Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .section-heading {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .service-box {
            padding: 20px;
            margin-bottom: 20px;
        }
        .text-primary {
            color: #007bff;
        }
        .text-muted {
            color: #6c757d;
        }
        .wow {
            visibility: visible;
            animation-name: bounceIn;
        }
        .bounceIn {
            animation-duration: 2s;
            animation-fill-mode: both;
        }
    </style>
</head>
<body>
    <section id="services">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">My Interests</h2>
                    <hr class="primary">
                </div>
            </div>
        </div>
        <div class="container">
            <div class="row">
                <div class="col-lg-3 col-md-6 text-center">
                    <div class="service-box">
                        <i class="fa fa-4x fa-futbol wow bounceIn text-primary"></i>
                        <h3>Sport</h3>
                        <p class="text-muted">A healthy mind in a healthy body</p>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 text-center">
                    <div class="service-box">
                        <i class="fa fa-4x fa-microchip wow bounceIn text-primary" data-wow-delay=".1s"></i>
                        <h3>Technology</h3>
                        <p class="text-muted">Embrace the beauty of technology. Make the world a better place to live.</p>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 text-center">
                    <div class="service-box">
                        <i class="fa fa-4x fa-tree wow bounceIn text-primary" data-wow-delay=".2s"></i>
                        <h3>Nature</h3>
                        <p class="text-muted">Embrace the wild. Love camping.</p>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 text-center">
                    <div class="service-box">
                        <i class="fa fa-4x fa-graduation-cap wow bounceIn text-primary" data-wow-delay=".3s"></i>
                        <h3>Lifelong Learning</h3>
                        <p class="text-muted">Stay Hungry, Stay Foolish</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
